<button class="email" onclick="emailPdf()">Email PDF</button>

<script>
const PIN="2307";
const ROWS=7;
const STORAGE_KEY="ane_yulviane_timesheet_email_v3";
const EMAIL_TO="info@camelotcottages.com.au";

function setStatus(text){
  document.getElementById("status-pill").innerText="Status: "+text;
}

function mins(v){
  if(!v) return null;
  let p=v.split(":");
  return parseInt(p[0],10)*60 + parseInt(p[1],10);
}

function calcHours(s,f){
  let a=mins(s), b=mins(f);
  if(a==null || b==null || b<a) return 0;
  return (b-a)/60;
}

function recalc(){
  let th=0, ts=0, tb=0;
  for(let i=0;i<ROWS;i++){
    let s=document.getElementById("start-"+i).value;
    let f=document.getElementById("finish-"+i).value;
    let sm=parseInt(document.getElementById("small-"+i).value || 0, 10) || 0;
    let bg=parseInt(document.getElementById("big-"+i).value || 0, 10) || 0;
    let h=calcHours(s,f);
    document.getElementById("hrs-"+i).innerText=h.toFixed(2);
    th+=h; ts+=sm; tb+=bg;
  }
  document.getElementById("total-hours").innerText=th.toFixed(2);
  document.getElementById("total-small").innerText=ts;
  document.getElementById("total-big").innerText=tb;
  saveLocal();
}

function saveLocal(){
  const data=[];
  for(let i=0;i<ROWS;i++){
    data.push({
      start:document.getElementById("start-"+i).value,
      finish:document.getElementById("finish-"+i).value,
      small:document.getElementById("small-"+i).value,
      big:document.getElementById("big-"+i).value
    });
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadLocal(){
  try {
    const data=JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    if(!Array.isArray(data)) return;
    for(let i=0;i<ROWS;i++){
      const row=data[i] || {};
      document.getElementById("start-"+i).value=row.start || "";
      document.getElementById("finish-"+i).value=row.finish || "";
      document.getElementById("small-"+i).value=row.small || "";
      document.getElementById("big-"+i).value=row.big || "";
    }
  } catch(e) {}
}

function resetWeek(){
  let p=prompt("Enter PIN");
  if(p!==PIN){alert("Incorrect PIN");return}
  for(let i=0;i<ROWS;i++){
    document.getElementById("start-"+i).value="";
    document.getElementById("finish-"+i).value="";
    document.getElementById("small-"+i).value="";
    document.getElementById("big-"+i).value="";
    document.getElementById("hrs-"+i).innerText="0.00";
  }
  recalc();
}

function currentDateLabel(){
  return new Date().toLocaleDateString("en-AU", {
    timeZone: "Australia/Brisbane",
    day: "2-digit",
    month: "2-digit",
    year: "numeric"
  });
}

function buildPdf(){
  const jsPDF=window.jspdf.jsPDF;
  const doc=new jsPDF({ unit:"pt", format:"a4" });
  const margin=40;
  let y=50;

  doc.setFont("helvetica","bold");
  doc.setFontSize(18);
  doc.text("Ane Yulviane Timesheet", margin, y);

  y+=22;
  doc.setFont("helvetica","normal");
  doc.setFontSize(10);
  doc.text("Generated: " + currentDateLabel(), margin, y);

  y+=24;
  doc.setFont("helvetica","bold");
  const colX=[margin, 90, 170, 250, 320, 390];
  doc.text("Day", colX[0], y);
  doc.text("Start", colX[1], y);
  doc.text("Finish", colX[2], y);
  doc.text("Hours", colX[3], y);
  doc.text("Small", colX[4], y);
  doc.text("Big", colX[5], y);

  y+=8;
  doc.line(margin, y, 555, y);
  y+=16;
  doc.setFont("helvetica","normal");

  let totalHours=0, totalSmall=0, totalBig=0;
  const dayNames=["Sat","Sun","Mon","Tue","Wed","Thu","Fri"];

  for(let i=0;i<ROWS;i++){
    const s=document.getElementById("start-"+i).value || "-";
    const f=document.getElementById("finish-"+i).value || "-";
    const sm=parseInt(document.getElementById("small-"+i).value || 0, 10) || 0;
    const bg=parseInt(document.getElementById("big-"+i).value || 0, 10) || 0;
    const h=calcHours(document.getElementById("start-"+i).value, document.getElementById("finish-"+i).value);

    totalHours += h;
    totalSmall += sm;
    totalBig += bg;

    doc.text(dayNames[i], colX[0], y);
    doc.text(s, colX[1], y);
    doc.text(f, colX[2], y);
    doc.text(h.toFixed(2), colX[3], y);
    doc.text(String(sm), colX[4], y);
    doc.text(String(bg), colX[5], y);
    y += 20;
  }

  y += 6;
  doc.line(margin, y, 555, y);
  y += 18;
  doc.setFont("helvetica","bold");
  doc.text("Totals", colX[0], y);
  doc.text(totalHours.toFixed(2), colX[3], y);
  doc.text(String(totalSmall), colX[4], y);
  doc.text(String(totalBig), colX[5], y);

  return {
    filename: "ane-yulviane-timesheet-" + currentDateLabel().replaceAll("/", "-") + ".pdf",
    dataUri: doc.output("datauristring")
  };
}

async function emailPdf(){
  recalc();
  setStatus("building PDF");
  try {
    const pdf=buildPdf();
    setStatus("sending email");
    const res=await fetch("/.netlify/functions/send-timesheet", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        to:EMAIL_TO,
        filename:pdf.filename,
        pdfDataUri:pdf.dataUri,
        totals:{
          hours:document.getElementById("total-hours").innerText,
          small:document.getElementById("total-small").innerText,
          big:document.getElementById("total-big").innerText
        }
      })
    });
    const json=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(json.error || "Email failed");
    setStatus("email sent");
    alert("Timesheet emailed successfully.");
  } catch(err) {
    setStatus("email failed");
    alert("Email failed. " + err.message);
  }
}

for(let i=0;i<ROWS;i++){
  document.getElementById("start-"+i).addEventListener("change", recalc);
  document.getElementById("finish-"+i).addEventListener("change", recalc);
  document.getElementById("small-"+i).addEventListener("input", recalc);
  document.getElementById("big-"+i).addEventListener("input", recalc);
}

loadLocal();
recalc();
</script>
