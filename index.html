
<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ane Yulviane Timesheet</title>
<style>
body{font-family:Arial;margin:0;background:#f6f3ef}
.wrap{padding:10px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th,td{padding:6px;border-bottom:1px solid #ddd;text-align:center;font-size:14px}
th{background:#eee}
select,input{width:100%;padding:6px;box-sizing:border-box}

.day{width:12%}
.start{width:26%}
.finish{width:26%}
.hrs{width:12%}
.small{width:12%}
.big{width:12%}

button{padding:10px;border:none;border-radius:6px;margin:4px}
.calc{background:#dfeade}
.email{background:#2d6a4f;color:white}
.reset{background:#a14b4b;color:white}
</style>
</head>

<body>

<div class="wrap">
<h2>Ane Yulviane Timesheet</h2>

<table>
<thead>
<tr>
<th class="day">Day</th>
<th class="start">Start</th>
<th class="finish">Finish</th>
<th class="hrs">Hrs</th>
<th class="small">Small</th>
<th class="big">Big</th>
</tr>
</thead>

<tbody id="rows"></tbody>
</table>

<p>Total Hours: <b id="total-hours">0.00</b></p>
<p>Total Small: <b id="total-small">0</b></p>
<p>Total Big: <b id="total-big">0</b></p>

<button class="calc" onclick="recalc()">Calculate</button>
<button class="email" onclick="alert('Email PDF button unchanged in this layout file')">Email PDF</button>
<button class="reset" onclick="resetWeek()">Reset Week</button>

</div>

<script>
const PIN="2307"
const days=["Sat","Sun","Mon","Tue","Wed","Thu","Fri"]
const rows=document.getElementById("rows")

function timeOptions(){
  let o='<option value=""></option>'
  for(let h=7;h<=18;h++){
    for(let m of [0,15,30,45]){
      let v=(h.toString().padStart(2,"0")+":"+m.toString().padStart(2,"0"))
      let h12=((h+11)%12)+1
      let ampm=h<12?"am":"pm"
      o+=`<option value="${v}">${h12}:${m.toString().padStart(2,"0")}${ampm}</option>`
    }
  }
  return o
}

for(let i=0;i<7;i++){
  rows.innerHTML+=`
  <tr>
    <td class="day">${days[i]}</td>
    <td class="start"><select id="start-${i}">${timeOptions()}</select></td>
    <td class="finish"><select id="finish-${i}">${timeOptions()}</select></td>
    <td class="hrs" id="hrs-${i}">0.00</td>
    <td class="small"><input id="small-${i}" type="number"></td>
    <td class="big"><input id="big-${i}" type="number"></td>
  </tr>`
}

function mins(v){
  if(!v) return null
  let p=v.split(":")
  return parseInt(p[0],10)*60 + parseInt(p[1],10)
}

function calcHours(s,f){
  let a=mins(s), b=mins(f)
  if(a==null || b==null || b<a) return 0
  return (b-a)/60
}

function recalc(){
  let th=0, ts=0, tb=0
  for(let i=0;i<7;i++){
    let s=document.getElementById("start-"+i).value
    let f=document.getElementById("finish-"+i).value
    let sm=parseInt(document.getElementById("small-"+i).value || 0, 10) || 0
    let bg=parseInt(document.getElementById("big-"+i).value || 0, 10) || 0
    let h=calcHours(s,f)
    document.getElementById("hrs-"+i).innerText=h.toFixed(2)
    th+=h
    ts+=sm
    tb+=bg
  }
  document.getElementById("total-hours").innerText=th.toFixed(2)
  document.getElementById("total-small").innerText=ts
  document.getElementById("total-big").innerText=tb
}

function resetWeek(){
  let p=prompt("Enter PIN")
  if(p!==PIN){alert("Incorrect PIN");return}
  for(let i=0;i<7;i++){
    document.getElementById("start-"+i).value=""
    document.getElementById("finish-"+i).value=""
    document.getElementById("small-"+i).value=""
    document.getElementById("big-"+i).value=""
    document.getElementById("hrs-"+i).innerText="0.00"
  }
  recalc()
}

for(let i=0;i<7;i++){
  document.getElementById("start-"+i).addEventListener("change", recalc)
  document.getElementById("finish-"+i).addEventListener("change", recalc)
  document.getElementById("small-"+i).addEventListener("input", recalc)
  document.getElementById("big-"+i).addEventListener("input", recalc)
}

recalc()
</script>

</body>
</html>
